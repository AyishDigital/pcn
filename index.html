<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AYISH DIGITAL</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100dvh; 
    background: #020617;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e5e7eb;
    overflow: hidden;
    position: relative;
  }

  /* Animasi Background Digital Bergerak */
  .bg-animation {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
  }

  .blob {
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(37, 99, 235, 0.15);
    filter: blur(80px);
    border-radius: 50%;
    animation: move 15s infinite alternate;
  }

  .blob-2 {
    background: rgba(139, 92, 246, 0.1);
    width: 400px;
    height: 400px;
    right: -100px;
    bottom: -100px;
    animation: move 20s infinite alternate-reverse;
  }

  @keyframes move {
    from { transform: translate(-20%, -20%); }
    to { transform: translate(20%, 20%); }
  }

  .card {
    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    padding: 30px 20px 40px 20px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* Container Logo */
  .logo-container {
    width: 90px;
    height: 90px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    margin: 0 auto 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
  }

  .logo-container img {
    width: 75%;
    height: auto;
    object-fit: contain;
  }

  .badge {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.3);
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(to bottom, #ffffff 40%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .features {
    text-align: left;
    margin-bottom: 30px;
  }

  .feature-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 14px 18px;
    border-radius: 16px;
    margin-bottom: 10px;
    font-size: 15px;
    color: #cbd5f5;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .check-icon {
    color: #3b82f6;
    font-weight: bold;
    font-size: 14px;
  }

  /* Butang dengan label baru */
  a.button {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 18px 10px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 800;
    font-size: 14px; /* Dikecilkan sedikit supaya muat satu baris pada phone */
    transition: all 0.3s ease;
    background: #ffffff;
    color: #020617;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .download-btn:active {
    transform: scale(0.97);
  }

  .footer {
    margin-top: 30px;
    font-size: 11px;
    color: #64748b;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .fade-up {
    animation: fadeInUp 0.8s ease-out forwards;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

  <div class="bg-animation">
    <div class="blob"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="card fade-up">
    <div class="logo-container">
      <img src="https://raw.githubusercontent.com/AyishDigital/Logo_Personal/main/Logo_Personal/AD1.png" alt="Ayish Digital Logo">
    </div>

    <div class="badge">IPTV CHANNEL AND MOVIES</div>

    <h1>AYISH DIGITAL</h1>
    
    <div class="features">
      <div class="feature-item">
        <span class="check-icon">✓</span> 
        <span><strong>Premium</strong> Service</span>
      </div>
      <div class="feature-item">
        <span class="check-icon">✓</span> 
        <span>Update Setiap Hari</span>
      </div>
      <div class="feature-item">
        <span class="check-icon">✓</span> 
        <span>Kualiti HD & FHD</span>
      </div>
    </div>

    <!-- Butang dikemaskini -->
    <a href="http://link.ayishstore.com/app" class="button download-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download Apps OTT Premium
    </a>

    <div class="footer">
      EST. 2026 • AYISH DIGITAL
    </div>
  </div>

</body>
</html>
