<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100dvh; 
    background: #020617;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e5e7eb;
    overflow-x: hidden;
    position: relative;
  }

  /* Digital Background */
  .bg-animation {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
  }

  .blob {
    position: absolute; width: 300px; height: 300px;
    background: rgba(37, 99, 235, 0.1);
    filter: blur(80px); border-radius: 50%;
    animation: move 15s infinite alternate;
  }

  @keyframes move {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
  }

  .card {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 35px;
    padding: 30px 25px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    text-align: center;
    position: relative;
    z-index: 1;
    margin: 20px;
  }

  /* Status Server Indicator */
  .status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    color: #4ade80;
    text-transform: uppercase;
    margin-bottom: 15px;
    letter-spacing: 1px;
  }

  .dot {
    width: 6px; height: 6px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 10px #22c55e;
    animation: blink 1.5s infinite;
  }

  @keyframes blink { 
    0%, 100% { opacity: 1; } 
    50% { opacity: 0.3; } 
  }

  .logo-container {
    width: 85px; height: 85px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    margin: 0 auto 15px auto;
    display: flex;
    justify-content: center; align-items: center;
  }

  .logo-container img { width: 70%; height: auto; }

  /* Stats Section */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .stat-item { font-size: 11px; color: #94a3b8; }
  .stat-item strong { color: #fff; display: block; font-size: 14px; }

  h1 {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(to bottom, #ffffff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
  }

  .welcome-text { font-size: 13px; color: #64748b; margin-bottom: 20px; }

  .payment-notice {
    background: rgba(59, 130, 246, 0.05);
    border-radius: 18px; padding: 15px;
    margin-bottom: 25px; text-align: left;
    border: 1px solid rgba(59, 130, 246, 0.1);
  }

  .payment-notice p { font-size: 11px; line-height: 1.6; color: #cbd5f5; }

  .button-group { display: flex; flex-direction: column; gap: 12px; }

  a.button {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; width: 100%; padding: 16px;
    border-radius: 18px; text-decoration: none;
    font-weight: 800; font-size: 13px;
    text-transform: uppercase; transition: 0.3s;
  }

  .telegram-btn {
    background: #0088cc; color: white;
    box-shadow: 0 10px 20px rgba(0, 136, 204, 0.2);
  }

  .download-btn {

  .button:active { transform: scale(0.96); }

  .footer {
    margin-top: 30px; font-size: 10px;
    color: #475569; letter-spacing: 2px;
  }

  .fade-up { animation: fadeInUp 0.8s ease-out forwards; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
